<div
  class="course-card"
  [ngClass]="cardClasses"
  [ngStyle]="{ 'border-left-color': borderLeftColor }"
  appHighlight="lightcyan"
>
  <div class="card-header">
    <h3>{{ course.name }}</h3>
    <span class="course-code">{{ course.code }}</span>
  </div>

  <div class="card-body">
    <p class="credits">Credits: {{ course.credits | creditLabel }}</p>

    <!-- Step 27: *ngSwitch badge display per gradeStatus -->
    <div class="badge-container" [ngSwitch]="course.gradeStatus">
      <span *ngSwitchCase="'passed'" class="badge badge-passed">Passed</span>
      <span *ngSwitchCase="'failed'" class="badge badge-failed">Failed</span>
      <span *ngSwitchDefault class="badge badge-pending">Pending</span>
    </div>

    <!-- Step 31: Toggle expanded details -->
    <div *ngIf="isExpanded" class="extra-details">
      <p>Course ID: {{ course.id }}</p>
      <p>Department: Computer Science</p>
      <p>Status: Active Registration</p>
    </div>
  </div>

  <div class="card-actions">
    <button class="btn btn-secondary" (click)="toggleDetails()">
      {{ isExpanded ? 'Hide Details' : 'Show Details' }}
    </button>

    <button class="btn btn-primary" (click)="onEnrollClick()">
      {{ isEnrolled ? 'Unenroll' : 'Enroll' }}
    </button>
  </div>
</div>
